<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Rematrix Player</title>
    <link rel="stylesheet" href="player.css" />
  </head>
  <body>
    <div id="fps-counter"></div>
    <div id="player">
      <video id="video"></video>

      <canvas id="visualizer" style="display: block"></canvas>

      <div id="center-btn">
        <div class="play-icon">
          <svg
            id="playSvg"
            fill="#000000"
            height="800px"
            width="800px"
            version="1.1"
            xmlns="http://www.w3.org/2000/svg"
            xmlns:xlink="http://www.w3.org/1999/xlink"
            viewBox="0 0 32 32"
            xml:space="preserve"
          >
            <path
              d="M21.6,15.2l-9-7c-0.3-0.2-0.7-0.3-1.1-0.1C11.2,8.3,11,8.6,11,9v14c0,0.4,0.2,0.7,0.6,0.9C11.7,24,11.9,24,12,24
	c0.2,0,0.4-0.1,0.6-0.2l9-7c0.2-0.2,0.4-0.5,0.4-0.8S21.9,15.4,21.6,15.2z"
            />
          </svg>
          <svg
            id="pauseSvg"
            style="display: none"
            fill="#000000"
            height="800px"
            width="800px"
            version="1.1"
            xmlns="http://www.w3.org/2000/svg"
            xmlns:xlink="http://www.w3.org/1999/xlink"
            viewBox="0 0 32 32"
            xml:space="preserve"
          >
            <g>
              <path
                d="M14,8H9C8.4,8,8,8.4,8,9v14c0,0.6,0.4,1,1,1h5c0.6,0,1-0.4,1-1V9C15,8.4,14.6,8,14,8z"
              />
              <path
                d="M23,8h-5c-0.6,0-1,0.4-1,1v14c0,0.6,0.4,1,1,1h5c0.6,0,1-0.4,1-1V9C24,8.4,23.6,8,23,8z"
              />
            </g>
          </svg>
          <svg
            fill="#000000"
            height="200px"
            width="200px"
            version="1.1"
            id="replaySvg"
            style="display: none; width: 50%; height: 50%"
            xmlns="http://www.w3.org/2000/svg"
            xmlns:xlink="http://www.w3.org/1999/xlink"
            viewBox="0 0 314.998 314.998"
            xml:space="preserve"
          >
            <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
            <g
              id="SVGRepo_tracerCarrier"
              stroke-linecap="round"
              stroke-linejoin="round"
            ></g>
            <g id="SVGRepo_iconCarrier">
              <g transform="translate(0 -562.36)">
                <g>
                  <g>
                    <polygon
                      points="128.6,656.912 128.6,656.912 128.6,656.912 "
                    ></polygon>
                    <path
                      d="M115.5,671.112v97.7c0,10.5,10.5,17.3,19.9,12.6l98.2-48.8c10-5.3,10-20,0-25.2l-98.2-48.8c-2.1-1.1-4.2-1.7-6.8-1.7 C121.3,657.412,115.5,663.212,115.5,671.112z M143.3,693.712l52.5,26.3l-52.5,26.3V693.712z"
                    ></path>
                    <path
                      d="M237.8,590.812c-23.6-12.6-49.3-18.4-74.5-17.9l0,0c-3.7,0-7.4,0.6-11.1,1.1c-28.3,2.6-55.6,14.2-78.7,33.1 c-7.3-6.3-17.3-10-27.8-10c-25.2,0-45.7,20.5-45.7,45.7c0,24.7,20.5,45.2,45.7,45.2c24.6,0,45.1-20.5,45.1-45.2 c0-4.2-0.6-8.4-1.6-12.6c0.6,0,1.1-0.6,1.6-1.1c37.3-31.6,90.3-37.3,133.9-13.7c43,23.1,67.7,70.4,61.4,119.2 s-41.5,88.7-88.7,100.8c-47.8,12.1-98.2-6.3-126.5-46.2c-11.1-15.2-33.6,1.1-22.6,15.8c35.2,49.3,97.1,72.4,155.9,57.2 c58.3-14.7,102.4-64,109.7-124.4C321.3,678.012,290.8,619.212,237.8,590.812z M45.7,660.112c-9.9,0-17.8-7.8-17.8-17.3 c0-10,7.8-17.9,17.8-17.9c9.4,0,17.3,7.9,17.3,17.9C63,652.212,55.1,660.112,45.7,660.112z"
                    ></path>
                  </g>
                </g>
              </g>
            </g>
          </svg>
        </div>
      </div>

      <div id="loading">
        <div class="loader-dot"></div>
        <div class="loader-dot"></div>
        <div class="loader-dot"></div>
      </div>

      <button
        id="mute-btn"
        class="control-btn"
        style="display: none !important"
      >
        <i></i>
      </button>
    </div>

    <div id="timeline-container">
      <div id="time-container">
        <span id="current-time" class="time-bubble">0:00</span>
        <span id="total-time" class="time-bubble">0:00</span>
      </div>

      <div id="timeline">
        <div id="progress-bar"></div>
      </div>
    </div>

    <script src="player.js"></script>
  </body>
</html>
