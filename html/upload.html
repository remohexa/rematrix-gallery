<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rematrix Upload</title>
    <link rel="icon" href="/assets/icons/rema.ico" type="image/x-icon" />
    <link rel="stylesheet" href="/css/main.css" />
    <link rel="stylesheet" href="/css/elements/buttons_text_statics.css" />
    <link rel="stylesheet" href="/css/pages/upload.css" />
  </head>
  <body>
    <header>
      <div class="LOGO">
        <a href="/">
          <span>Re</span>
          <span>Matrix</span>
          <span>Gallery</span>
        </a>
      </div>
      <div id="Delete">
        <button class="rematrix_corners rematrix_button" error>
          <div><span class="animated_text">Remove</span></div>
        </button>
      </div>
    </header>

    <div class="upload_layout" id="uploadLayout">
      <div>
        <section class="upload_media" id="uploadmedia">
          <div class="media_box" id="media_box" style="display: none"></div>
          <div id="temploader">
            <div class="temploader-dot"></div>
            <div class="temploader-dot"></div>
            <div class="temploader-dot"></div>
          </div>
          <button class="rematrix_button add-button" id="addmedia">
            <div>
              <span></span>
              <span></span>
            </div>
          </button>
        </section>
        <section class="upload_controls">
          <span id="error_box">Allowed formats: [mp4,mp3,jpeg,png,gif]</span>

          <section>
            <form class="rematrix_input" id="form">
              <div>
                <label for="title" required
                  ><span class="input_label">Title</span></label
                >
                <input
                  id="title"
                  class="rematrix_corners"
                  type="text"
                  name="title"
                  required
                />
              </div>

              <div>
                <label for="description"
                  ><span class="input_label">description</span></label
                >

                <textarea
                  id="description"
                  class="rematrix_corners"
                  type="text"
                  name="desc"
                  ac
                ></textarea>
              </div>
            </form>
          </section>
        </section>
      </div>
      <div class="buttons_login">
        <button
          class="rematrix_corners rematrix_button"
          id="post_button"
          disabled
        >
          <div><span class="animated_text">Post</span></div>
        </button>
        <button
          class="rematrix_corners rematrix_button"
          id="progress_button"
          hidden
        >
          <div>
            <span id="progress_text" class="animated_text">Post</span>
          </div>
        </button>
      </div>
    </div>
  </body>
  <script type="module" src="/js/routes/upload.js"></script>
</html>
